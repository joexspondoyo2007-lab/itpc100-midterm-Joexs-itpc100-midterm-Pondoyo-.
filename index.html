<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Company Profile Card</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Global Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #f0f4f8, #d9e2ec);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
        }

        header {
            background-color: #1e90ff;
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        header p {
            margin-top: 10px;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        article {
            background-color: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            max-width: 450px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        article:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        article h2 {
            color: #1e90ff;
            margin-bottom: 15px;
        }

        article p {
            line-height: 1.6;
            color: #555;
        }

        footer {
            background-color: #f8f9fa;
            text-align: center;
            padding: 30px 20px;
            box-shadow: 0 -4px 8px rgba(0,0,0,0.05);
        }

        footer p {
            margin: 0 0 15px 0;
            color: #777;
        }

        footer button {
            background-color: #1e90ff;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }

        footer button:hover {
            background-color: #005bb5;
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 500px) {
            header h1 {
                font-size: 2rem;
            }
            article {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>My Startup Company</h1>
        <p>Building simple and modern web solutions</p>
    </header>

    <main>
        <article>
            <h2>About Us</h2>
            <p>
                We are a small startup focused on creating clean and user-friendly
                websites. Our goal is to help businesses grow online using modern
                web technologies.
            </p>
        </article>
    </main>

    <footer>
        <p>© 2026 My Startup Company</p>
        <button>Contact Us</button>
    </footer>

</body>
</html>
